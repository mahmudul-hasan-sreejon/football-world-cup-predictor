<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a1d1a"/>
      <stop offset="1" stop-color="#06100f"/>
    </linearGradient>
    <linearGradient id="gold" x1="16" y1="4" x2="16" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffe49a"/>
      <stop offset="0.5" stop-color="#f6c945"/>
      <stop offset="1" stop-color="#c9930f"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <rect x="0.75" y="0.75" width="30.5" height="30.5" rx="6.25" fill="none" stroke="#f6c945" stroke-opacity="0.5" stroke-width="1.5"/>
  <!-- FIFA World Cup trophy: twisting figures cradling the globe atop a round base -->
  <g fill="url(#gold)">
    <!-- globe -->
    <ellipse cx="16" cy="8" rx="4" ry="4.2"/>
    <!-- twisting body: two strands sweeping up from the base to support the globe -->
    <path d="M11.7 9.5 C12 14 13.6 17.5 14.7 19.5 L17.3 19.5 C18.4 17.5 20 14 20.3 9.5 C19.4 11 18 12.2 16 12.2 C14 12.2 12.6 11 11.7 9.5 Z"/>
    <!-- base -->
    <path d="M12.4 19.5 H19.6 L19.6 21 H12.4 Z"/>
    <ellipse cx="16" cy="22.2" rx="5.4" ry="1.6"/>
    <rect x="10.6" y="22.2" width="10.8" height="2.4"/>
    <ellipse cx="16" cy="24.6" rx="5.4" ry="1.6"/>
  </g>
</svg>
